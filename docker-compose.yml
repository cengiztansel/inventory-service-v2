services:
  # 1. Servis: PostgreSQL Veritabanı
  db:
    image: postgres:16-alpine
    container_name: inventory-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: St716944
      POSTGRES_DB: inventory
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d inventory"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Servis: Spring Boot Uygulaması
  app:
    build: .
    container_name: inventory-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy # DB tamamen hazır olmadan uygulama başlamasın
    environment:
# Veritabanı bağlantısı (Konteynır ismi olan 'db' kullanılıyor)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/inventory
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: St716944
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"