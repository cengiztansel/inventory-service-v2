version: '3.8'
services:
  db:
    image: postgres:16
    container_name: postgres-db-container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: St716944
      POSTGRES_DB: postgres-db
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: inventory-app-container
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      # Uygulamanın konteynır içindeki DB'ye "db" ismiyle ulaşmasını sağlıyoruz
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/postgres-db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: St716944
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
